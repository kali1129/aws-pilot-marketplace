version: "3.9"
services:
  aws-pilot-mcp:
    build: .
    image: aws-pilot-mcp:latest
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8080:8080"   # bind localhost only; expose via reverse proxy
    volumes:
      - aws-pilot-data:/data
      - ${HOME}/.aws:/root/.aws:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  aws-pilot-data:
